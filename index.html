<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>밤티코인 조별대항 주식</title>
<link rel="stylesheet" href="/style.css">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFE8D1">
</head>
<body>
  <div class="header">
    <div class="badge">밤티코인</div>
    <h1>조별대항 주식</h1>
    <div class="sub">2026 여름수련회 · 실내 프로그램</div>
  </div>
  <div class="container">
    <div class="card">
      <div class="section-title">조별 화면 (아이패드)</div>
      <div class="home-links" id="teamLinks"></div>
    </div>
    <div class="card">
      <div class="section-title">스탭 화면</div>
      <div class="home-links">
        <a href="/exchange.html"><button class="btn secondary">💱 밤티 거래소 (매수·매도·시세)</button></a>
        <a href="/booth.html"><button class="btn secondary">🎮 부스 (정보 지급)</button></a>
        <a href="/board.html"><button class="btn secondary">📊 공용 전광판</button></a>
      </div>
    </div>
  </div>
<script>
fetch('/api/config').then(r=>r.json()).then(cfg=>{
  const el = document.getElementById('teamLinks');
  cfg.teams.forEach((name,i)=>{
    const a = document.createElement('a');
    a.href = '/team.html?team=t' + (i+1);
    a.innerHTML = '<button class="btn">' + name + ' 화면 열기</button>';
    el.appendChild(a);
  });
});
</script>
</body>
</html>
